name: "Report: Client Version Usage"

on:
  workflow_dispatch:
  workflow_call:

# Least-privilege default: this report only reads the repo to census notebooks.
permissions:
  contents: read

jobs:
  analyze-client-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install nbformat --system

      - name: Run version census
        run: python3 .github/scripts/version-census.py
