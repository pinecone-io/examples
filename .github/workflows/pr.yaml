name: "Pull Request"

on:
  pull_request:
  push:
    branches:
      - main

# All jobs only read the checkout; no writes via GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  lint:
    uses: './.github/workflows/lint.yaml'

  report-client-versions:
    uses: './.github/workflows/client-versions.yaml'
    secrets: inherit

  test-notebooks:
    uses: './.github/workflows/test-notebooks-changed.yaml'
    secrets: inherit
