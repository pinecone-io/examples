name: "Run Notebook"
description: "Run a notebook end-to-end against a real Jupyter kernel via nbclient"

inputs:
  notebook:
    description: "The notebook to run"
    required: true
  PINECONE_API_KEY:
    description: "The Pinecone API key"
    required: true
  OPENAI_API_KEY:
    description: "The OpenAI API key"
    required: true
  HF_TOKEN:
    description: "The Hugging Face token"
    required: true
  ANTHROPIC_API_KEY:
    description: "The Anthropic API key"
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install runner dependencies
      shell: bash
      run: |
        pip install --upgrade pip
        pip install nbformat nbclient ipykernel

    - name: Run the notebook
      shell: bash
      run: |
        python .github/actions/run-notebook/run-notebook.py "${{ inputs.notebook }}"
      env:
        PINECONE_API_KEY: ${{ inputs.PINECONE_API_KEY }}
        OPENAI_API_KEY: ${{ inputs.OPENAI_API_KEY }}
        HF_TOKEN: ${{ inputs.HF_TOKEN }}
        ANTHROPIC_API_KEY: ${{ inputs.ANTHROPIC_API_KEY }}
